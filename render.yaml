services:
  # Web Service para API y Sockets
  - type: web
    name: iron-dune-api
    runtime: node
    buildCommand: npm install
    startCommand: npx tsx apps/api/src/index.ts
...
  # Background Worker
  - type: worker
    name: iron-dune-worker
    runtime: node
    buildCommand: npm install
    startCommand: npx tsx apps/worker/src/index.ts

    envVars:
      - key: NODE_ENV
        value: production
