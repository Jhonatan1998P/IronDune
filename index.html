
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Iron Dune: Operations</title>
    <meta name="description" content="Next-Gen Browser Strategy Game" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2306b6d4'/><text x='50' y='70' font-family='Arial' font-size='60' font-weight='bold' text-anchor='middle' fill='%23000'>ID</text></svg>" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              metal: {
                50: '#f8fafc',
                100: '#f1f5f9',
                200: '#e2e8f0',
                300: '#cbd5e1',
                400: '#94a3b8',
                500: '#64748b',
                600: '#475569',
                700: '#334155',
                800: '#1e293b',
                900: '#0f172a',
                950: '#020617',
              },
              neon: {
                blue: '#00f3ff',
                purple: '#bc13fe',
              }
            },
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui'],
              mono: ['Fira Code', 'monospace'],
            },
            backdropBlur: {
              xs: '2px',
            },
            animation: {
              'drift': 'drift 60s linear infinite',
              'drift-slow': 'drift 120s linear infinite reverse',
              'tutorial-bounce': 'tutorialBounce 1.5s infinite',
              'tutorial-pulse': 'tutorialPulse 2s infinite',
            },
            keyframes: {
              drift: {
                '0%': { backgroundPosition: '0 0' },
                '100%': { backgroundPosition: '100px 100px' },
              },
              tutorialBounce: {
                '0%, 100%': { transform: 'translate(0, 0)' },
                '50%': { transform: 'translate(10px, 10px)' },
              },
              tutorialPulse: {
                '0%': { boxShadow: '0 0 0 0 rgba(6, 182, 212, 0.7)' },
                '70%': { boxShadow: '0 0 0 15px rgba(6, 182, 212, 0)' },
                '100%': { boxShadow: '0 0 0 0 rgba(6, 182, 212, 0)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700&display=swap');
      
      body {
        background-color: #020617;
        font-family: 'Inter', sans-serif;
        overflow: hidden; /* App-like feel */
      }
      
      .font-tech {
        font-family: 'Orbitron', sans-serif;
      }

      /* Custom Scrollbar for glass panels */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.25);
      }

      .glass-panel {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      }
      
      .glass-button {
        background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
        border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(4px);
      }

      .text-glow {
        text-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
      }

      /* Dynamic Background Patterns */
      .bg-grid-pattern {
        background-image: 
          linear-gradient(rgba(6, 182, 212, 0.07) 1px, transparent 1px), 
          linear-gradient(90deg, rgba(6, 182, 212, 0.07) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      .bg-dots-pattern {
        background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        background-size: 60px 60px;
      }
    </style>
<script type="importmap">
{
  "imports": {

    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
  }
}
</script>
</head>
